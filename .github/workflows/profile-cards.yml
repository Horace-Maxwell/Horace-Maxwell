name: profile-summary-cards

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate summary cards (no auto-push)
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 8
          AUTO_PUSH: false

      - name: Keep only the tokyonight theme and commit
        run: |
          mkdir -p assets/cards
          cp profile-summary-card-output/tokyonight/*.svg assets/cards/
          rm -rf profile-summary-card-output
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/cards
          if git diff --staged --quiet; then
            echo "No card changes."
          else
            git commit -m "📊 Update profile summary cards (tokyonight)"
            git push
          fi
