name: metrics

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Horace-Maxwell
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          config_padding: 6%
          plugins_errors_fatal: no

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, scss, jupyter notebook, tex
          plugin_languages_details: percentage, bytes
          plugin_languages_sections: most-used

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          extras_css: |
            svg, body { background: #0d0a1f !important; color: #c9d1e0 !important; }
            .background, rect.background { fill: #0d0a1f !important; }
            h1, h2, h3 { color: #f0b429 !important; }
            h2 { border-bottom: 1px solid #30225e !important; }
            .field, .footnote, .cakeday, .no-activity, small, .infos, .meta, time, .details { color: #a8a3c0 !important; }
            .field svg, .octicon, svg.icon, .icon svg, use { fill: #8b5cf6 !important; }
            a, a * { color: #38bdf8 !important; }
            text, tspan { fill: #c9d1e0; }
            .calendar-graph text, .isocalendar text { fill: #c9d1e0 !important; }
