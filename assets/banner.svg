<svg viewBox="0 0 1200 400" width="1200" height="400" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Horace — 观天之道 执天之行">
  <defs>
    <radialGradient id="nebula" cx="50%" cy="42%" r="80%">
      <stop offset="0%" stop-color="#2a1a4a"/>
      <stop offset="45%" stop-color="#160e2e"/>
      <stop offset="100%" stop-color="#07050e"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.45"/>
      <stop offset="45%" stop-color="#6d28d9" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8a2ff"/>
      <stop offset="34%" stop-color="#8b5cf6"/>
      <stop offset="66%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f0b429"/>
      <animate attributeName="x1" values="0%;30%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;130%;100%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f0b429" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shoot" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="pGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3d0"/><stop offset="35%" stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#f0b429" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d9f4ff"/><stop offset="35%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="9"/></filter>
    <filter id="tagGlow" x="-30%" y="-70%" width="160%" height="240%"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="nebBlur" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="26"/></filter>
    <filter id="starGlow" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="1200" height="400" fill="url(#nebula)"/>

  <!-- layered nebula clouds -->
  <g filter="url(#nebBlur)">
    <circle cx="235" cy="180" r="150" fill="#6d28d9" opacity="0.30"/>
    <circle cx="1000" cy="300" r="175" fill="#1d4ed8" opacity="0.26"/>
    <circle cx="1055" cy="85" r="95" fill="#b45309" opacity="0.20"/>
    <circle cx="175" cy="330" r="115" fill="#0ea5e9" opacity="0.15"/>
    <circle cx="640" cy="70" r="120" fill="#a21caf" opacity="0.10"/>
  </g>

  <!-- central glow behind title -->
  <ellipse cx="600" cy="200" rx="330" ry="120" fill="url(#coreGlow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- orbit rings -->
  <ellipse cx="600" cy="200" rx="365" ry="142" fill="none" stroke="#f0b429" stroke-width="0.6" opacity="0.10"/>
  <ellipse cx="600" cy="200" rx="292" ry="106" fill="none" stroke="#38bdf8" stroke-width="0.6" opacity="0.10"/>

  <!-- star field -->
  <g fill="#ffffff">
    <circle cx="80" cy="60" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="200" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="300" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.8s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="260" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="345" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.1s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="320" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="440" cy="80" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" begin="1.7s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="250" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="120" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="345" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.9s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="690" cy="95" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" begin="1.3s" repeatCount="indefinite"/></circle>
    <circle cx="730" cy="300" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.3s" begin="0.1s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="160" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="840" cy="325" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.7s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="915" cy="115" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" begin="0.35s" repeatCount="indefinite"/></circle>
    <circle cx="965" cy="250" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="1030" cy="160" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" begin="0.55s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="320" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="4s" begin="0.95s" repeatCount="indefinite"/></circle>
    <circle cx="1130" cy="95" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="220" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.25s" repeatCount="indefinite"/></circle>
    <circle cx="40" cy="160" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="1.05s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="45" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="0.75s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="45" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" begin="0.45s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="50" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="460" cy="360" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="0.65s" repeatCount="indefinite"/></circle>
    <circle cx="880" cy="372" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" begin="1.35s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="372" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.9s" begin="0.15s" repeatCount="indefinite"/></circle>
    <circle cx="1170" cy="350" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" begin="0.85s" repeatCount="indefinite"/></circle>
    <circle cx="30" cy="380" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" begin="1.45s" repeatCount="indefinite"/></circle>
    <circle cx="790" cy="372" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="1095" cy="200" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="510" cy="300" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="360" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" begin="0.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- sparkle stars -->
  <g fill="#ffffff">
    <g transform="translate(1075,155)"><path d="M0,-9 L1.3,-1.3 L9,0 L1.3,1.3 L0,9 L-1.3,1.3 L-9,0 L-1.3,-1.3 Z"><animateTransform attributeName="transform" type="scale" values="0.5;1.1;0.5" dur="3s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="1s" repeatCount="indefinite"/></path></g>
    <g transform="translate(500,335)"><path d="M0,-8 L1.2,-1.2 L8,0 L1.2,1.2 L0,8 L-1.2,1.2 L-8,0 L-1.2,-1.2 Z"><animateTransform attributeName="transform" type="scale" values="0.5;1;0.5" dur="3.8s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;1;0.4" dur="3.8s" begin="0.5s" repeatCount="indefinite"/></path></g>
    <g transform="translate(925,60)"><path d="M0,-8 L1.2,-1.2 L8,0 L1.2,1.2 L0,8 L-1.2,1.2 L-8,0 L-1.2,-1.2 Z"><animateTransform attributeName="transform" type="scale" values="0.5;1;0.5" dur="3.2s" begin="1.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" begin="1.6s" repeatCount="indefinite"/></path></g>
  </g>

  <!-- 北斗七星 · Big Dipper (斗魁四星 + 斗柄三星) -->
  <g opacity="0.8">
    <g stroke="#bcd8ff" stroke-width="1" opacity="0.5" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <path d="M248,92 L315,80 L320,126 L256,132 Z"/>
      <path d="M248,92 L195,74 L140,80 L85,95"/>
    </g>
    <g fill="#f2f7ff">
      <circle cx="315" cy="80" r="2.1"><animate attributeName="opacity" values="0.55;1;0.55" dur="2.8s" begin="0.8s" repeatCount="indefinite"/></circle>
      <circle cx="320" cy="126" r="1.9"><animate attributeName="opacity" values="0.55;1;0.55" dur="2.9s" begin="1s" repeatCount="indefinite"/></circle>
      <circle cx="256" cy="132" r="1.8"><animate attributeName="opacity" values="0.55;1;0.55" dur="3s" begin="0.5s" repeatCount="indefinite"/></circle>
      <circle cx="248" cy="92" r="1.7"><animate attributeName="opacity" values="0.55;1;0.55" dur="3.2s" begin="0.2s" repeatCount="indefinite"/></circle>
      <circle cx="195" cy="74" r="1.8"><animate attributeName="opacity" values="0.55;1;0.55" dur="3.4s" begin="0.4s" repeatCount="indefinite"/></circle>
      <circle cx="140" cy="80" r="1.7"><animate attributeName="opacity" values="0.55;1;0.55" dur="3.5s" begin="0.6s" repeatCount="indefinite"/></circle>
      <circle cx="85" cy="95" r="1.9"><animate attributeName="opacity" values="0.55;1;0.55" dur="3.1s" begin="1.2s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- orbiting planets -->
  <g>
    <circle r="7" fill="url(#pGold)"><animateMotion dur="28s" repeatCount="indefinite" rotate="auto" path="M235,200 A365,142 0 1,1 965,200 A365,142 0 1,1 235,200"/></circle>
    <circle r="2.4" fill="#fff3d0"><animateMotion dur="28s" repeatCount="indefinite" path="M235,200 A365,142 0 1,1 965,200 A365,142 0 1,1 235,200"/></circle>
  </g>
  <g>
    <circle r="6" fill="url(#pCyan)"><animateMotion dur="22s" repeatCount="indefinite" path="M308,200 A292,106 0 1,0 892,200 A292,106 0 1,0 308,200"/></circle>
    <circle r="2" fill="#d9f4ff"><animateMotion dur="22s" repeatCount="indefinite" path="M308,200 A292,106 0 1,0 892,200 A292,106 0 1,0 308,200"/></circle>
  </g>

  <!-- luopan · rotating compass (后天八卦 · King Wen order) -->
  <g transform="translate(600,200)">
    <g opacity="0.22">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="100s" repeatCount="indefinite"/>
      <circle r="198" fill="none" stroke="#f0b429" stroke-width="1"/>
      <circle r="168" fill="none" stroke="#8b5cf6" stroke-width="1"/>
      <g fill="#e6d6ff" font-size="26" font-family="serif" text-anchor="middle" dominant-baseline="central">
        <text x="0" y="-183">☲</text><text x="129" y="-129">☷</text><text x="183" y="0">☱</text><text x="129" y="129">☰</text>
        <text x="0" y="183">☵</text><text x="-129" y="129">☶</text><text x="-183" y="0">☳</text><text x="-129" y="-129">☴</text>
      </g>
    </g>
    <g opacity="0.20" stroke="#c8a2ff" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="70s" repeatCount="indefinite"/>
      <line x1="150" y1="0" x2="160" y2="0"/><line x1="0" y1="150" x2="0" y2="160"/><line x1="-150" y1="0" x2="-160" y2="0"/><line x1="0" y1="-150" x2="0" y2="-160"/>
      <line x1="106" y1="106" x2="113" y2="113"/><line x1="-106" y1="106" x2="-113" y2="113"/><line x1="106" y1="-106" x2="113" y2="-113"/><line x1="-106" y1="-106" x2="-113" y2="-113"/>
      <line x1="139" y1="57" x2="148" y2="61"/><line x1="57" y1="139" x2="61" y2="148"/><line x1="-57" y1="139" x2="-61" y2="148"/><line x1="-139" y1="57" x2="-148" y2="61"/>
      <line x1="-139" y1="-57" x2="-148" y2="-61"/><line x1="-57" y1="-139" x2="-61" y2="-148"/><line x1="57" y1="-139" x2="61" y2="-148"/><line x1="139" y1="-57" x2="148" y2="-61"/>
      <circle r="155" fill="none" stroke-width="0.5"/>
    </g>
    <g opacity="0.16">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="50s" repeatCount="indefinite"/>
      <circle r="120" fill="none" stroke="#38bdf8" stroke-width="0.6" stroke-dasharray="3 8"/>
      <circle r="96" fill="none" stroke="#f0b429" stroke-width="0.5" stroke-dasharray="1 10"/>
    </g>
  </g>

  <!-- shooting stars -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="880,35;520,205" dur="8s" begin="1.5s" repeatCount="indefinite"/>
    <line x1="0" y1="0" x2="36" y2="14" stroke="url(#shoot)" stroke-width="1.6" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.62;0.72;1" dur="8s" begin="1.5s" repeatCount="indefinite"/>
    </line>
  </g>
  <g>
    <animateTransform attributeName="transform" type="translate" values="1010,300;760,120" dur="9s" begin="5s" repeatCount="indefinite"/>
    <line x1="0" y1="0" x2="30" y2="-16" stroke="url(#shoot)" stroke-width="1.4" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.6;0.7;1" dur="9s" begin="5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- ===== KEEP: HORACE title ===== -->
  <g text-anchor="middle" font-family="'Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif">
    <text x="600" y="182" font-size="70" font-weight="800" letter-spacing="14" fill="url(#titleGrad)" filter="url(#bigGlow)" opacity="0.55">HORACE
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="600" y="182" font-size="70" font-weight="800" letter-spacing="14" fill="url(#titleGrad)">HORACE</text>
  </g>

  <!-- ===== KEEP: 观天之道 执天之行 (crisp = glow behind + sharp on top) ===== -->
  <text x="600" y="234" text-anchor="middle" font-size="27" font-weight="600" letter-spacing="8"
        font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',serif" fill="#f0b429" filter="url(#tagGlow)" opacity="0.5">观天之道 · 执天之行</text>
  <text x="600" y="234" text-anchor="middle" font-size="27" font-weight="600" letter-spacing="8"
        font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',serif" fill="#f0b429">观天之道 · 执天之行</text>

  <rect x="420" y="256" width="360" height="2" rx="1" fill="url(#lineGrad)"/>
  <text x="600" y="286" text-anchor="middle" font-size="14" letter-spacing="5"
        font-family="'PingFang SC','Noto Sans SC','Fira Code',monospace" fill="#8fd7f5">紫微 · 八字 · 占星 · 六壬 · 遁甲 · 太乙 · 玄学 · 道法 · AI</text>
</svg>
