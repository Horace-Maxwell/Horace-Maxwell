      <stop offset="45%" stop-color="#8fd7f5"/>
      <stop offset="100%" stop-color="#f0b429"/>
    </linearGradient>
  </defs>
  <g font-family="'Fira Code','PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif"
