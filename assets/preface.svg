<svg viewBox="0 0 900 792" width="900" height="792" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="灵宪 · 序言">
  <defs>
    <radialGradient id="pbg" cx="50%" cy="28%" r="88%">
      <stop offset="0%" stop-color="#1d1338"/>
      <stop offset="55%" stop-color="#120c26"/>
      <stop offset="100%" stop-color="#090714"/>
    </radialGradient>
    <linearGradient id="ptitle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7d774"/>
      <stop offset="55%" stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#c8a2ff"/>
    </linearGradient>
    <linearGradient id="pdiv" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f0b429" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pshoot" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/><stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
    <filter id="ptglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sealGlow" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="pnbblur" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="26"/></filter>
  </defs>

  <rect width="900" height="792" fill="url(#pbg)"/>

  <!-- nebula glow -->
  <g filter="url(#pnbblur)">
    <circle cx="120" cy="150" r="120" fill="#6d28d9" opacity="0.22"/>
    <circle cx="800" cy="640" r="130" fill="#1d4ed8" opacity="0.18"/>
    <circle cx="820" cy="120" r="80" fill="#b45309" opacity="0.14"/>
  </g>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="90" cy="120" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="810" cy="90" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="640" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="770" cy="680" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="400" r="0.9"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" begin="1.3s" repeatCount="indefinite"/></circle>
    <circle cx="840" cy="430" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="60" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="742" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="70" cy="560" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.3s" begin="0.45s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="560" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="230" cy="70" r="0.9"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="0.75s" repeatCount="indefinite"/></circle>
    <circle cx="660" cy="740" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" begin="0.15s" repeatCount="indefinite"/></circle>
  </g>

  <!-- shooting star -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="700,150;480,360" dur="9s" begin="3s" repeatCount="indefinite"/>
    <line x1="0" y1="0" x2="30" y2="14" stroke="url(#pshoot)" stroke-width="1.4" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.6;0.7;1" dur="9s" begin="3s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- rotating bagua watermark -->
  <g transform="translate(450,468)" opacity="0.07" fill="none" stroke="#c8a2ff">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="140s" repeatCount="indefinite"/>
      <circle r="252" stroke="#f0b429" stroke-width="1"/>
      <circle r="206" stroke-width="1"/>
      <circle r="160" stroke="#38bdf8" stroke-width="0.6" stroke-dasharray="3 8"/>
      <g fill="#c8a2ff" stroke="none" font-size="34" font-family="serif" text-anchor="middle" dominant-baseline="central">
        <text x="229" y="0">☰</text><text x="162" y="162">☱</text><text x="0" y="229">☲</text><text x="-162" y="162">☳</text>
        <text x="-229" y="0">☴</text><text x="-162" y="-162">☵</text><text x="0" y="-229">☶</text><text x="162" y="-162">☷</text>
      </g>
    </g>
  </g>

  <!-- corner flourishes -->
  <g stroke="#f0b429" stroke-width="1.4" fill="none" opacity="0.55" stroke-linecap="round">
    <path d="M34 70 L34 34 L70 34"/><circle cx="34" cy="34" r="2" fill="#f0b429" stroke="none"/>
    <path d="M830 34 L866 34 L866 70"/><circle cx="866" cy="34" r="2" fill="#f0b429" stroke="none"/>
    <path d="M34 722 L34 758 L70 758"/><circle cx="34" cy="758" r="2" fill="#f0b429" stroke="none"/>
    <path d="M866 722 L866 758 L830 758"/><circle cx="866" cy="758" r="2" fill="#f0b429" stroke="none"/>
  </g>

  <!-- seal behind title (square) -->
  <rect x="413" y="27" width="74" height="74" rx="14" fill="none" stroke="#f0b429" stroke-width="1.2" opacity="0.34"/>

  <!-- title: soft glow behind + crisp on top, centered -->
  <text x="450" y="65" text-anchor="middle" dominant-baseline="central" font-size="46" font-weight="700" fill="url(#ptitle)" filter="url(#sealGlow)" opacity="0.5"
        font-family="'Songti SC','STSong','Noto Serif SC','SimSun',serif">序</text>
  <text x="450" y="65" text-anchor="middle" dominant-baseline="central" font-size="46" font-weight="700" fill="url(#ptitle)"
        font-family="'Songti SC','STSong','Noto Serif SC','SimSun',serif">序</text>
  <text x="450" y="132" text-anchor="middle" font-size="13" fill="#8fd7f5" letter-spacing="8"
        font-family="'PingFang SC','Noto Sans SC',sans-serif">灵 宪 · LINGXIAN</text>
  <rect x="330" y="150" width="240" height="2" rx="1" fill="url(#pdiv)"/>

  <!-- body -->
  <g text-anchor="middle" font-family="'Songti SC','STSong','Noto Serif SC','SimSun',serif" font-size="18" letter-spacing="1">
    <text x="450" y="182" fill="#e3d8ff">生而为人，悲欢通困，却富有九州。</text>
    <text x="450" y="220" fill="#cfc2ee">我们存在于时空，恍若蜉蝣漂江海、秋虫奋山河。</text>
    <text x="450" y="254" fill="#cfc2ee">世界之于“我”，缠绵悱恻，似月在怀，又和光同尘。熟悉且陌生。</text>
    <text x="450" y="292" fill="#e3d8ff">自由意志与命定论的是非，至今无人可判。</text>
    <text x="450" y="332" fill="#f0b429">命运默然，则让她发声。</text>
    <text x="450" y="366" fill="#f0b429">命运虚伪，则让她消亡。</text>
    <text x="450" y="400" fill="#f0b429">命运虚实参半，则扬弃之。</text>
    <text x="450" y="440" fill="#e3d8ff">没有被证明之物，无须畏惧。无知者无畏，不莽者不前。</text>
    <text x="450" y="474" fill="#e3d8ff">天道幽微，生育万物。若真有形而上者，它必应许了人的诞生与渴求。</text>
    <text x="450" y="514" fill="#f7d774" font-size="20" font-weight="700">因此，人即天之道，求索即正义。</text>
    <text x="450" y="554" fill="#e3d8ff">借自我设限而求得安宁者，一去不返。如今的时代与国家，如日方生。</text>
    <text x="450" y="588" fill="#e3d8ff">自由与命定的博弈，总要结束。或早或晚。</text>
    <text x="450" y="626" fill="#c8a2ff">让它终结于今朝，终结于祖国，终结于三千年的求索，终结于此时此刻。</text>
    <text x="450" y="664" fill="#f7d774" font-weight="700">这是我们唯一的愿望。</text>
  </g>

  <rect x="330" y="702" width="240" height="1.5" rx="1" fill="url(#pdiv)"/>
  <text x="450" y="740" text-anchor="middle" font-size="13" fill="#8b8b9e" letter-spacing="2"
        font-family="'Songti SC','Noto Serif SC',serif"><tspan font-style="italic">—— 转载于荀爽《灵宪》 · horosa.com</tspan></text>
</svg>
