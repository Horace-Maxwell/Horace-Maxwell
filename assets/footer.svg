      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f0b429" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="fg" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#1a1033" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d0a1f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="96" fill="url(#fg)"/>
  <g fill="#ffffff">
    <circle cx="180" cy="26" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="60" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="30" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="1030" cy="62" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="20" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" begin="1.3s" repeatCount="indefinite"/></circle>
